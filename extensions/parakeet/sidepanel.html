<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parakeet AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect width="20" height="20" rx="4" fill="#3b82f6"/>
          <text x="10" y="14" text-anchor="middle" fill="white" font-size="12" font-weight="600">P</text>
        </svg>
        <span class="title">Parakeet AI</span>
      </div>
      <span class="status" id="status">Ready</span>
    </header>

    <section class="capture-section">
      <button class="btn btn-primary" id="capture-btn">
        <span class="btn-icon">●</span>
        <span class="btn-text">Start Capture</span>
      </button>
      
      <select class="select" id="tab-select">
        <option value="">Select a tab...</option>
      </select>
      
      <button class="btn btn-icon-only" id="refresh-tabs" title="Refresh tabs">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.65 2.35A8 8 0 1 0 15.5 8h-2a6 6 0 1 1-1.76-4.24l-1.24 1.24V4h3.5V0.5h-3.5V3.5l1.25-1.15z"/>
        </svg>
      </button>
    </section>

    <section class="volume-section">
      <div class="volume-meter">
        <div class="volume-bar" id="volume-bar"></div>
      </div>
      <span class="volume-label">Audio Level</span>
      <span class="volume-value" id="volume-value">0%</span>
    </section>

    <section class="controls">
      <button class="btn btn-sm" id="auto-paste-btn" title="Auto-paste to page">
        <span>Auto-paste</span>
        <span class="toggle" id="auto-paste-toggle">○</span>
      </button>
      
      <button class="btn btn-sm" id="clickthrough-btn" title="Click through mode">
        <span>Click-through</span>
        <span class="toggle" id="clickthrough-toggle">○</span>
      </button>
      
      <button class="btn btn-sm" id="stealth-btn" title="Stealth mode">
        <span>Stealth</span>
        <span class="toggle" id="stealth-toggle">○</span>
      </button>
    </section>

    <section class="transcript-section">
      <div class="section-header">
        <h2>Transcript</h2>
        <button class="btn btn-xs" id="clear-transcript">Clear</button>
      </div>
      <div class="transcript-list" id="transcript-list">
        <p class="empty-state">No transcript yet. Start capture to begin.</p>
      </div>
    </section>

    <section class="answers-section">
      <div class="section-header">
        <h2>AI Answers</h2>
        <div class="badge" id="model-badge">Ready</div>
      </div>
      <div class="answers-list" id="answers-list">
        <p class="empty-state">AI answers will appear here</p>
      </div>
    </section>

    <section class="footer">
      <span class="hint">Press Opt+P to toggle • Answers are hidden from screen share</span>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
