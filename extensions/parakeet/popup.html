<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parakeet AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">P</div>
        <span class="logo-text">Parakeet AI</span>
      </div>
      <div class="header-actions">
        <span class="status-badge" id="status">Ready</span>
      </div>
    </div>

    <!-- Auth Warning -->
    <div id="auth-view" class="view hidden">
      <div class="auth-card">
        <p class="auth-title">Sign in required</p>
        <p class="auth-text">You need to be signed in to use Parakeet AI</p>
        <button class="btn btn-primary btn-lg" id="open-app-btn">Open App & Sign In</button>
      </div>
    </div>

    <!-- Setup View -->
    <div id="setup-view" class="view">
      <div class="form-group">
        <label>Select Interview Tab</label>
        <select id="tab-select">
          <option value="">Detecting meetings...</option>
        </select>
        <button class="btn btn-sm" id="refresh-tabs">↻ Refresh</button>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="auto-answer" checked>
          Auto-detect questions & generate answers
        </label>
      </div>

      <button class="btn btn-primary btn-lg" id="start-btn">
        <span class="btn-icon">▶</span> Start Session
      </button>
    </div>

    <!-- Session View -->
    <div id="session-view" class="view hidden">
      <div class="session-header">
        <div class="session-info">
          <span class="dot live"></span>
          <span id="session-duration">00:00</span>
        </div>
        <button class="btn btn-danger btn-sm" id="stop-btn">■ Stop</button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="transcript">Transcript</button>
        <button class="tab" data-tab="answers">Answers</button>
      </div>

      <!-- Transcript -->
      <div class="tab-content" id="tab-transcript">
        <div id="transcript-list" class="scroll-list">
          <p class="empty">Listening for questions...</p>
        </div>
      </div>

      <!-- Answers -->
      <div class="tab-content hidden" id="tab-answers">
        <div id="answers-list" class="scroll-list">
          <p class="empty">AI answers will appear here</p>
        </div>
      </div>

      <!-- Quick Question -->
      <div class="quick-question">
        <input type="text" id="quick-question" placeholder="Type a question..." />
        <button class="btn btn-sm" id="ask-btn">Ask</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
